<!doctype html>
<html lang="en">

<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Video Canvas</title>
	<link rel="stylesheet" href="style.css">
</head>

<body>
	<!-- Lobby: shown before joining -->
	<div id="lobby">
		<div class="lobby-card">
			<h1>Video Canvas</h1>
			<p class="lobby-subtitle">MoQ-powered video conferencing</p>

			<div class="lobby-fields">
				<label for="room-input">Room</label>
				<input id="room-input" type="text" placeholder="e.g. my-room" autocomplete="off" />

				<label for="name-input">Your Name</label>
				<input id="name-input" type="text" placeholder="e.g. Alice" autocomplete="off" />
			</div>

			<button id="join-btn" type="button">Join Room</button>

			<p class="lobby-hint">
				Or share a link: <code id="share-url"></code>
			</p>
		</div>
	</div>

	<!-- Room: shown after joining -->
	<div id="room" class="hidden" role="main">
		<div id="room-header" role="banner">
			<div id="room-header-left">
				<span id="room-name" aria-label="Room name"></span>
				<span id="connection-status" class="status-connected" role="status" aria-live="polite" title="Connection status">connected</span>
			</div>
			<button id="copy-link-btn" type="button" title="Copy invite link" aria-label="Copy invite link">Copy Link</button>
		</div>

		<div id="room-body">
			<div id="video-grid" role="region" aria-label="Video participants"></div>

			<aside id="chat-panel" class="hidden" aria-label="Chat">
				<div id="chat-header">
					<span>Chat</span>
					<button id="chat-close-btn" type="button" title="Close chat" aria-label="Close chat">&times;</button>
				</div>
				<div id="chat-messages" role="log" aria-live="polite" aria-label="Chat messages"></div>
				<form id="chat-form">
					<input id="chat-input" type="text" placeholder="Send a message..." autocomplete="off" aria-label="Chat message" />
					<button type="submit" title="Send" aria-label="Send message">Send</button>
				</form>
			</aside>
		</div>

		<nav id="controls" aria-label="Call controls">
			<button id="mic-btn" type="button" title="Toggle microphone (M)" aria-label="Toggle microphone" aria-pressed="true">Mic On</button>
			<button id="camera-btn" type="button" title="Toggle camera (V)" aria-label="Toggle camera" aria-pressed="true">Cam On</button>
			<button id="screen-btn" type="button" title="Share screen (S)" aria-label="Share screen" aria-pressed="false">Screen</button>
			<button id="chat-btn" type="button" title="Toggle chat (C)" aria-label="Toggle chat" aria-pressed="false">Chat</button>
			<button id="leave-btn" type="button" title="Leave room" aria-label="Leave room">Leave</button>
		</nav>
	</div>

	<div id="debug-overlay" class="hidden"></div>

	<script type="module" src="main.ts"></script>
</body>

</html>
